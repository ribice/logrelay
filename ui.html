<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>logrelay</title>
<style>
  :root {
    --bg: #101214;
    --panel: #181a1d;
    --border: #34383d;
    --text: #eceff1;
    --muted: #9aa3aa;
    --accent: #4fb286;
    --error: #ff6b5f;
    --warn: #e5b64f;
    --info: #62c584;
    --debug: #9aa3aa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 14px;
    margin: 0 12px 0 0;
    font-weight: 600;
  }
  input, select, button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font: inherit;
    border-radius: 4px;
  }
  input[type=text] { min-width: 140px; }
  input[type=text].search { flex: 1; min-width: 220px; }
  input[type=text].short { width: 130px; }
  select.short { width: 150px; }
  input[type=datetime-local], input[type=number] { width: 150px; }
  input[type=number] { width: 80px; }
  input[type=checkbox] { accent-color: var(--accent); }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.danger { color: var(--error); border-color: var(--error); }
  button.danger:hover { background: var(--error); color: var(--bg); }
  label { color: var(--muted); font-size: 12px; }
  #status { color: var(--muted); margin-left: auto; font-size: 12px; }
  main { padding: 0 16px 16px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  tr:hover td { background: var(--panel); }
  td.ts { color: var(--muted); white-space: nowrap; font-size: 12px; }
  td.system { color: var(--text); white-space: nowrap; font-size: 12px; }
  td.system .sub { color: var(--muted); margin-top: 2px; }
  td.lvl { font-weight: 600; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
  .lvl-error, .lvl-fatal, .lvl-panic, .lvl-dpanic { color: var(--error); }
  .lvl-warn { color: var(--warn); }
  .lvl-info { color: var(--info); }
  .lvl-debug, .lvl-trace { color: var(--debug); }
  td.msg { word-break: break-word; }
  td.msg .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  details.raw { margin-top: 6px; color: var(--muted); }
  details.raw summary { cursor: pointer; display: inline-block; font-size: 12px; }
  details.raw pre {
    margin: 6px 0 0;
    max-height: 280px;
    overflow: auto;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    white-space: pre-wrap;
  }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  .footer {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    padding: 14px 0 0;
  }
  .footer label {
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }
</style>
</head>
<body>
<header>
  <h1>logrelay</h1>
  <input type="text" id="q" class="search" placeholder="search messages, errors, paths, request_ids, apps…" autofocus>
  <select id="app" class="short">
    <option value="">all apps</option>
  </select>
  <select id="source" class="short">
    <option value="">all sources</option>
  </select>
  <select id="level">
    <option value="">all levels</option>
    <option value="debug">debug</option>
    <option value="info">info</option>
    <option value="warn">warn</option>
    <option value="error">error</option>
    <option value="fatal">fatal</option>
    <option value="panic">panic</option>
  </select>
  <label>from <input type="datetime-local" id="since" step="1"></label>
  <label>to <input type="datetime-local" id="until" step="1"></label>
  <label>status <input type="number" id="status_min" min="0" max="599" placeholder="min"> – <input type="number" id="status_max" min="0" max="599" placeholder="max"></label>
  <button id="refresh">refresh</button>
  <label><input type="checkbox" id="auto_refresh" checked> live</label>
  <button id="reset">reset</button>
  <button id="clear" class="danger" title="Delete logs matching current filters (or all logs if no filters)">clear</button>
  <span id="status"></span>
</header>
<main>
  <table>
    <thead>
      <tr>
        <th style="width:170px">time</th>
        <th style="width:140px">system</th>
        <th style="width:70px">level</th>
        <th>message</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" hidden>no logs match</div>
  <div class="footer">
    <button id="more" hidden>load more</button>
  </div>
</main>
<script>
  const $ = (s) => document.querySelector(s);
  const rows = $('#rows');
  const empty = $('#empty');
  const status = $('#status');
  const more = $('#more');
  const pageLimit = 300;
  let loadedLogs = [];

  function fmtTime(nanos) {
    const d = new Date(nanos / 1e6);
    const pad = (n, w=2) => String(n).padStart(w, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function escape(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function prettyRaw(raw) {
    if (!raw) return '';
    try {
      return JSON.stringify(JSON.parse(raw), null, 2);
    } catch {
      return raw;
    }
  }

  // datetime-local values are interpreted in the browser's local zone; convert
  // to unix nanos so the server's filter matches what the user picked on screen.
  function localDatetimeToNanos(value) {
    if (!value) return null;
    const ms = new Date(value).getTime();
    if (Number.isNaN(ms)) return null;
    return ms * 1e6;
  }

  function buildParams() {
    const params = new URLSearchParams();
    const q = $('#q').value.trim();
    const app = $('#app').value;
    const source = $('#source').value;
    const level = $('#level').value;
    const since = localDatetimeToNanos($('#since').value);
    const until = localDatetimeToNanos($('#until').value);
    const sMin = $('#status_min').value;
    const sMax = $('#status_max').value;
    if (q) params.set('q', q);
    if (app) params.set('app', app);
    if (source) params.set('source', source);
    if (level) params.set('level', level);
    if (since !== null) params.set('since', String(since));
    if (until !== null) params.set('until', String(until));
    if (sMin) params.set('status_min', sMin);
    if (sMax) params.set('status_max', sMax);
    return params;
  }

  function hasFilters() {
    const p = buildParams();
    return [...p.keys()].length > 0;
  }

  async function load({ append = false } = {}) {
    const params = buildParams();
    params.set('limit', String(pageLimit));
    if (append && loadedLogs.length > 0) {
      params.set('before', String(loadedLogs[loadedLogs.length - 1].id));
    }

    status.textContent = 'loading…';
    more.disabled = true;
    try {
      const res = await fetch('api/logs?' + params);
      if (!res.ok) throw new Error('http ' + res.status);
      const data = await res.json();
      const incoming = data.logs || [];
      loadedLogs = append ? loadedLogs.concat(incoming) : incoming;
      render(loadedLogs);
      more.hidden = incoming.length < pageLimit;
      status.textContent = `${loadedLogs.length} entries`;
      if (!append) loadFilters();
    } catch (e) {
      status.textContent = 'error: ' + e.message;
    } finally {
      more.disabled = false;
    }
  }

  async function loadFilters() {
    try {
      const res = await fetch('api/filters');
      if (!res.ok) return;
      const data = await res.json();
      populateSelect($('#app'), data.apps || [], 'all apps');
      populateSelect($('#source'), data.sources || [], 'all sources');
    } catch {
      // The filters are convenience controls; log loading still works without them.
    }
  }

  function populateSelect(select, values, allLabel) {
    const current = select.value;
    select.innerHTML = `<option value="">${allLabel}</option>`;
    for (const value of values) {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    }
    if (current && !values.includes(current)) {
      const option = document.createElement('option');
      option.value = current;
      option.textContent = current;
      select.appendChild(option);
    }
    select.value = current;
  }

  function resetFilters() {
    $('#q').value = '';
    $('#app').value = '';
    $('#source').value = '';
    $('#level').value = '';
    $('#since').value = '';
    $('#until').value = '';
    $('#status_min').value = '';
    $('#status_max').value = '';
    load();
  }

  async function clearLogs() {
    const filtered = hasFilters();
    const msg = filtered
      ? 'Delete all log entries matching the current filters? This cannot be undone.'
      : 'Delete ALL log entries? This cannot be undone.';
    if (!confirm(msg)) return;

    const params = buildParams();
    status.textContent = 'deleting…';
    try {
      const res = await fetch('api/logs?' + params, { method: 'DELETE' });
      if (!res.ok) throw new Error('http ' + res.status);
      const data = await res.json();
      status.textContent = `deleted ${data.deleted ?? 0}`;
      loadFilters();
      load();
    } catch (e) {
      status.textContent = 'error: ' + e.message;
    }
  }

  function render(logs) {
    rows.innerHTML = '';
    empty.hidden = logs.length > 0;
    for (const r of logs) {
      const tr = document.createElement('tr');
      const meta = [];
      if (r.method || r.path) meta.push(`${escape(r.method || '')} ${escape(r.path || '')}`.trim());
      if (r.status_code) meta.push(`status=${r.status_code}`);
      if (r.host) meta.push(`host=${escape(r.host)}`);
      if (r.request_id) meta.push(`req=${escape(r.request_id)}`);
      if (r.error_text) meta.push(`error: ${escape(r.error_text)}`);
      if (r.prefix) meta.push(escape(r.prefix));
      const app = escape(r.app || '');
      const source = escape(r.source || '');
      const system = app || source
        ? `${app || '<span style="color:var(--muted)">-</span>'}${source ? `<div class="sub">${source}</div>` : ''}`
        : '<span style="color:var(--muted)">-</span>';
      const raw = r.raw ? `<details class="raw"><summary>raw</summary><pre>${escape(prettyRaw(r.raw))}</pre></details>` : '';
      tr.innerHTML = `
        <td class="ts">${fmtTime(r.ts)}</td>
        <td class="system">${system}</td>
        <td class="lvl lvl-${escape(r.level)}">${escape(r.level)}</td>
        <td class="msg">${escape(r.message) || '<span style="color:var(--muted)">(no message)</span>'}${meta.length ? `<div class="meta">${meta.join(' · ')}</div>` : ''}${raw}</td>`;
      rows.appendChild(tr);
    }
  }

  $('#refresh').addEventListener('click', load);
  $('#more').addEventListener('click', () => {
    $('#auto_refresh').checked = false;
    load({ append: true });
  });
  $('#reset').addEventListener('click', resetFilters);
  $('#clear').addEventListener('click', clearLogs);
  $('#q').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
  $('#app').addEventListener('change', load);
  $('#source').addEventListener('change', load);
  $('#level').addEventListener('change', load);
  $('#since').addEventListener('change', load);
  $('#until').addEventListener('change', load);
  let t;
  const debounced = () => { clearTimeout(t); t = setTimeout(load, 250); };
  $('#q').addEventListener('input', debounced);
  $('#status_min').addEventListener('input', debounced);
  $('#status_max').addEventListener('input', debounced);
  loadFilters();
  load();
  setInterval(() => {
    if ($('#auto_refresh').checked) load();
  }, 5000);
</script>
</body>
</html>
